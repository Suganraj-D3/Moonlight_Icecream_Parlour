<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moon Light Ice Cream Parlor</title>
    <link rel="stylesheet" href="styleitems.css">
    <style>
        .title { font-size:24px; margin:0; flex:1; text-align:center; }
        .main-wrapper { width:90%; max-width:980px; margin:40px auto; padding-top:10px; }
        .seat-selection { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:18px; }
        .seat { 
            background: rgba(255, 255, 255, 0.04); 
            color: #FFF; 
            height: 110px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color);
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 18px; 
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }
        .seat:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 8px 24px rgba(166, 120, 93, 0.4);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button id="menuToggle" type="button" aria-expanded="false" aria-controls="drawer" aria-label="Open menu">☰</button>
        <div class="title">Moon Light Ice Cream Parlor</div>
    </div>

    <div class="drawer" id="drawer">
        <a href="index.html">Home</a>
        <a href="admin.html">Admin Panel</a>
    </div>

    <div class="main-wrapper">
        <br>
        <br><br><br>
        <div class="seat-selection">
            
            <button class="seat" onclick="goToSeat('Seat 1')">Seat 1</button>
            <button class="seat" onclick="goToSeat('Seat 2')">Seat 2</button>
            <button class="seat" onclick="goToSeat('Seat 3')">Seat 3</button>
            <button class="seat" onclick="goToSeat('Seat 4')">Seat 4</button>
            <button class="seat" onclick="goToSeat('Seat 5')">Seat 5</button>
            <button class="seat" onclick="goToSeat('Seat 6')">Seat 6</button>
            <button class="seat" onclick="goToSeat('Seat 7')">Seat 7</button>
            <button class="seat" onclick="goToSeat('Seat 8')">Seat 8</button>
            <button class="seat" onclick="goToSeat('Seat 9')">Seat 9</button>
            <button class="seat" onclick="goToSeat('Seat 10')">Seat 10</button>
            <button class="seat" onclick="goToSeat('Seat 11')">Seat 11</button>
            <button class="seat" onclick="goToSeat('Seat 12')">Seat 12</button>
            <button class="seat" onclick="goToSeat('Seat 13')">Seat 13</button>
            <button class="seat" onclick="goToSeat('Seat 14')">Seat 14</button>
        </div>
    </div>

    <script>
        function goToSeat(seatName) { window.location.href = `itemsList.html?seat=${encodeURIComponent(seatName)}`; }

        // drawer toggle
        (function () {
            const drawer = document.getElementById('drawer');
            const menuToggle = document.getElementById('menuToggle');
            if (!drawer || !menuToggle) return;
            menuToggle.addEventListener('click', (e) => { e.stopPropagation(); const isOpen = drawer.classList.toggle('open'); menuToggle.setAttribute('aria-expanded', String(isOpen)); });
            document.addEventListener('click', () => { if (drawer.classList.contains('open')) { drawer.classList.remove('open'); menuToggle.setAttribute('aria-expanded', 'false'); } });
            drawer.addEventListener('click', (e) => e.stopPropagation());
        })();
    </script>

</body>
</html>
