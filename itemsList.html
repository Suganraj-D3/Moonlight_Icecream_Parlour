<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <title>Items List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styleitems.css">
</head>

<body>
    <div class="top-bar">
        <button id="menuToggle" type="button" aria-expanded="false" aria-controls="drawer" aria-label="Open menu">☰</button>
        <div class="title">Moon Light Ice Cream Parlor</div>
        <div class="search-bar" style="margin-left:auto;">
            <input id="globalSearch" type="search" placeholder="Search items..." aria-label="Search items" />
            <button id="globalSearchBtn" class="button-18" type="button">Search</button>
            <button id="clearSearchBtn" class="button-18" type="button" style="background:#666">Clear</button>
        </div>
    </div>

    <div class="drawer" id="drawer">
        <a href="index.html">Home</a>
        <a href="admin.html">Admin Panel</a>
    </div>
    
    <div class="box1">
        <!-- Rendered dynamically from menuData -->
    </div>

    <div class="box2">
        <h3>items</h3>
        <div style="margin-top: 20px; display:flex; gap:8px; align-items:center;">
            <button id="goHomeBtn" class="button-18" type="button" 
            style="margin-left: 50px;">🏠 Go Home</button>
            <button id="deleteAllBtn" class="button-18" type="button">🗑️ Delete All</button>
        </div>

        <div class="innerbox">
            <div class="cart">
                <span class="top">
                    <h3 style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; width: 100%;">
                        <span>TABLE: <span id="seatNumber"></span></span>
                        <button id="moveTableBtn" class="button-18" style="padding:4px 10px; font-size:12px; min-height:30px; background:var(--primary);">🔄 Move Table</button>
                    </h3>
                </span>
                <span class="middle"></span>
                <div class="total" style="text-align:right; font-weight:bold; margin-top:10px;">Total: ₹0</div>
                <span class="bottom">
                    <!-- Update the 'onclick' for KOT button to call the correct print function -->
                    <button class="but" id="kotBtn" type="button">KOT</button>
                    <button class="but" id="printBtn" type="button">Print Bill</button>
                </span>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/qz-tray@2.1.1/qz-tray.js"></script>
    <script>
        // drawer toggle shared script
        (function () {
            const drawer = document.getElementById('drawer');
            const menuToggle = document.getElementById('menuToggle');
            const topBar = document.querySelector('.top-bar');
            if (!drawer || !menuToggle || !topBar) return;

            // expose the top-bar height as a CSS variable so drawer positions correctly
            function updateTopbarHeightVar() {
                const h = Math.ceil(topBar.getBoundingClientRect().height);
                document.documentElement.style.setProperty('--topbar-height', h + 'px');
            }
            // set initially and on resize
            updateTopbarHeightVar();
            window.addEventListener('resize', updateTopbarHeightVar);

            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                const isOpen = drawer.classList.toggle('open');
                menuToggle.setAttribute('aria-expanded', String(isOpen));
            });
            document.addEventListener('click', () => {
                if (drawer.classList.contains('open')) {
                    drawer.classList.remove('open');
                    menuToggle.setAttribute('aria-expanded', 'false');
                }
            });
            drawer.addEventListener('click', (e) => e.stopPropagation());
        })();
    </script>
    <script src="menu.js"></script>
    <script src="scriptitems.js"></script>

</body>
</html>
